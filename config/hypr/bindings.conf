# ==========================================
# Brillo pantalla (Shift + ...)
# ==========================================

# Brillo subir
bind = SHIFT, F10, exec, brightnessctl set +5% && notify-send -a "Brillo" "☀️ Brillo" "$(brightnessctl -m | awk -F, '{print $4}')"

# Brillo bajar
bind = SHIFT, F9, exec, brightnessctl set 5%- && notify-send -a "Brillo" "🌙 Brillo" "$(brightnessctl -m | awk -F, '{print $4}')"
