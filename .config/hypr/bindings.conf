# =========================================================
# APPLICATIONS
# =========================================================

# Terminal
bindd = SUPER, RETURN, Terminal, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)"

# Tmux
bindd = SUPER ALT, RETURN, Tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" bash -c "tmux attach || tmux new -s Tmux"

# Default browser
bindd = SUPER SHIFT, B, Browser, exec, omarchy-launch-browser

# Private browser
bindd = SUPER SHIFT ALT, B, Browser (private), exec, omarchy-launch-browser --private

# File manager
bindd = SUPER SHIFT, F, File manager, exec, uwsm-app -- nautilus --new-window

# File manager (current terminal directory)
bindd = SUPER ALT SHIFT, F, File manager (cwd), exec, uwsm-app -- nautilus --new-window "$(omarchy-cmd-terminal-cwd)"

# Default editor (Neovim)
bindd = SUPER SHIFT, N, Editor, exec, omarchy-launch-editor


# =========================================================
# DEVELOPMENT
# =========================================================

# Visual Studio Code
bindd = SUPER SHIFT, V, VS Code, exec, uwsm-app -- code

# Gedit
bindd = SUPER SHIFT, G, Gedit, exec, uwsm-app -- gedit

# Lazygit
bindd = SUPER SHIFT, L, Lazygit, exec, omarchy-launch-tui lazygit

# Btop
bindd = SUPER SHIFT, H, Btop, exec, omarchy-launch-tui btop

# Cava
bindd = SUPER SHIFT, X, Cava, exec, omarchy-launch-tui cava

# Cmus
bindd = SUPER SHIFT, M, Music TUI, exec, omarchy-launch-tui cmus


# =========================================================
# WEB APPS (single instance)
# =========================================================
# NOTE:
# If a URL contains '#', write it as '##' so Hyprland
# does not interpret it as a comment.

# ChatGPT
bindd = SUPER SHIFT, A, ChatGPT, exec, omarchy-launch-or-focus-webapp ChatGPT "https://chatgpt.com"

# Gmail
bindd = SUPER SHIFT , Z, Gmail, exec, omarchy-launch-or-focus-webapp Gmail "https://mail.google.com"

# Google Drive
bindd = SUPER SHIFT, D, Google Drive, exec, omarchy-launch-or-focus-webapp Drive "https://drive.google.com"

# GitHub
bindd = SUPER SHIFT, I, GitHub, exec, omarchy-launch-or-focus-webapp GitHub "https://github.com"

# Reddit
bindd = SUPER SHIFT, R, Reddit, exec, omarchy-launch-or-focus-webapp Reddit "https://reddit.com"

# Spotify
bindd = SUPER SHIFT, S, Spotify, exec, omarchy-launch-or-focus-webapp Spotify "https://open.spotify.com"

# Google Translate
bindd = SUPER SHIFT, T, Translate, exec, omarchy-launch-or-focus-webapp Translate "https://translate.google.com"

# WhatsApp
bindd = SUPER SHIFT, W, WhatsApp, exec, omarchy-launch-or-focus-webapp WhatsApp "https://web.whatsapp.com"

# Google Messages
bindd = SUPER SHIFT CTRL, W, Google Messages, exec, omarchy-launch-or-focus-webapp "Google Messages" "https://messages.google.com/web/conversations"

# YouTube
bindd = SUPER SHIFT, Y, YouTube, exec, omarchy-launch-or-focus-webapp YouTube "https://youtube.com"

# Google Photos
bindd = SUPER SHIFT, P, Google Photos, exec, omarchy-launch-or-focus-webapp "Google Photos" "https://photos.google.com"


# =========================================================
# CAMERA
# =========================================================

# Open webcam or focus existing MPV window
bindd = SUPER SHIFT, C, CliCam, exec, if hyprctl clients | grep -q "mpv"; then hyprctl dispatch focuswindow "class:^(mpv)$"; else uwsm-app -- mpv av://v4l2:/dev/video0; fi


# =========================================================
# MULTIMEDIA
# =========================================================

# Previous track
bindd = SHIFT, left, Previous track, exec, playerctl previous && notify-send -a "Multimedia" "⏮ Anterior" "$(playerctl metadata artist) - $(playerctl metadata title)"

# Next track
bindd = SHIFT, right, Next track, exec, playerctl next && notify-send -a "Multimedia" "⏭ Siguiente" "$(playerctl metadata artist) - $(playerctl metadata title)"

# Play / Pause
bindd = SHIFT, SPACE, Play/Pause, exec, playerctl play-pause && notify-send -a "Multimedia" "▶ Estado" "$(playerctl status): $(playerctl metadata artist) - $(playerctl metadata title)"

# Toggle mute
bindd = SHIFT, F12, Mute audio, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle && notify-send -a "Audio" "🔇 Audio" "Silencio activado/desactivado"

# Volume up (+5%)
bindd = SHIFT, UP, Volume up, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+ && notify-send -a "Audio" "🔊 Volumen" "$(wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{printf "%.0f%%", $2*100}')"

# Volume down (-5%)
bindd = SHIFT, DOWN, Volume down, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- && notify-send -a "Audio" "🔉 Volumen" "$(wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{printf "%.0f%%", $2*100}')"


# =========================================================
# SCREEN BRIGHTNESS
# =========================================================

# Brightness up (+5%)
bindd = SHIFT, F10, Brightness up, exec, brightnessctl set +5% && notify-send -a "Brillo" "☀️ Brillo" "$(brightnessctl -m | awk -F, '{print $4}')"

# Brightness down (-5%)
bindd = SHIFT, F9, Brightness down, exec, brightnessctl set 5%- && notify-send -a "Brillo" "🌙 Brillo" "$(brightnessctl -m | awk -F, '{print $4}')"
